<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canh Buom Xanh | Teacher Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/tokens.css" />
    <link rel="stylesheet" href="./assets/css/base.css" />
    <link rel="stylesheet" href="./assets/css/components.css" />
    <link rel="stylesheet" href="./assets/css/pages/portal.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html">Canh Buom Xanh</a>
      <nav class="topnav">
        <a href="./index.html">Home</a>
        <a href="./teacher-portal.html" aria-current="page">Teacher Portal</a>
        <a href="./moderator.html">Moderator</a>
        <a href="./admin.html">Admin</a>
        <a href="./aiops.html">AIOps</a>
        <a href="./auth.html">Auth</a>
      </nav>
    </header>

    <main class="shell portal-main">
      <section class="grid-two">
        <article class="glass-card pane">
          <h2>Claim Profile</h2>
          <form id="claimForm" class="stack-form">
            <input type="number" name="teacherId" min="1" placeholder="Teacher ID" required />
            <button class="btn btn-primary" type="submit">Claim + Public</button>
          </form>
          <p id="claimMsg" class="status-line"></p>
        </article>

        <article class="glass-card pane">
          <h2>Opt-out Request</h2>
          <form id="optOutForm" class="stack-form">
            <input type="number" name="teacherId" min="1" placeholder="Teacher ID" required />
            <button class="btn btn-ghost" type="submit">Request opt-out</button>
          </form>
          <p id="optOutMsg" class="status-line"></p>
        </article>
      </section>

      <section class="grid-two lower">
        <article class="glass-card pane">
          <h2>Appeal Submission</h2>
          <form id="appealForm" class="stack-form">
            <input type="number" name="teacherId" min="1" placeholder="Teacher ID" required />
            <select name="targetType">
              <option value="post">post</option>
              <option value="comment">comment</option>
              <option value="profile">profile</option>
            </select>
            <input type="number" name="targetId" min="0" placeholder="Target ID" required />
            <textarea name="reason" rows="3" placeholder="Appeal reason" required></textarea>
            <button class="btn btn-primary" type="submit">Submit appeal</button>
          </form>
          <p id="appealMsg" class="status-line"></p>
        </article>

        <article class="glass-card pane">
          <h2>My Teacher Dashboard</h2>
          <button id="loadTeacherDash" class="btn btn-ghost" type="button">Load dashboard</button>
          <pre id="teacherDashOutput">No data</pre>
          <button id="loadMyAppeals" class="btn btn-ghost" type="button">Load my appeals</button>
          <pre id="teacherAppealsOutput">No data</pre>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./assets/js/api.js"></script>
    <script src="./assets/js/teacher-portal.js"></script>
  </body>
</html>

version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: cbx-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: canhbuomxanh
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cbx-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_NAME: canhbuomxanh-api
      APP_ENV: production
      APP_PORT: "8080"
      ALLOWED_ORIGINS: http://localhost:5500,http://127.0.0.1:5500
      RATE_LIMIT_MAX: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: canhbuomxanh
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: change_me_to_long_random_value
      JWT_EXPIRES_HOURS: "24"
    ports:
      - "8080:8080"

volumes:
  mysql_data:
